name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-sign-notarize:
    name: Build, Sign & Notarize
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Symlink Go to /usr/local/bin
        run: sudo ln -sf "$(which go)" /usr/local/bin/go

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install create-dmg
        run: brew install create-dmg

      # ── Certificate & Profile Setup ──────────────────────────────

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH

          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security list-keychain -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH

          rm $CERTIFICATE_PATH

      - name: Install provisioning profiles
        env:
          APP_PROFILE_BASE64: ${{ secrets.BURROW_APP_PROFILE_BASE64 }}
          TUNNEL_PROFILE_BASE64: ${{ secrets.BURROW_TUNNEL_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_PROFILE_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/Burrow_DeveloperID.provisionprofile
          echo "$TUNNEL_PROFILE_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/BurrowTunnel_DeveloperID.provisionprofile

      # ── Build ────────────────────────────────────────────────────

      - name: Resolve packages
        run: |
          xcodebuild -project Burrow.xcodeproj \
            -scheme Burrow \
            -resolvePackageDependencies

      - name: Archive
        run: |
          xcodebuild archive \
            -project Burrow.xcodeproj \
            -scheme Burrow \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath $RUNNER_TEMP/Burrow.xcarchive \
            -skipPackagePluginValidation \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── Sign ─────────────────────────────────────────────────────

      - name: Export and sign app
        env:
          IDENTITY: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH=$RUNNER_TEMP/export/Burrow.app
          mkdir -p $RUNNER_TEMP/export
          cp -R "$RUNNER_TEMP/Burrow.xcarchive/Products/Applications/Burrow.app" "$APP_PATH"

          # Embed provisioning profiles
          cp ~/Library/MobileDevice/Provisioning\ Profiles/Burrow_DeveloperID.provisionprofile \
            "$APP_PATH/Contents/embedded.provisionprofile"
          cp ~/Library/MobileDevice/Provisioning\ Profiles/BurrowTunnel_DeveloperID.provisionprofile \
            "$APP_PATH/Contents/PlugIns/BurrowTunnel.appex/Contents/embedded.provisionprofile"

          xattr -cr "$APP_PATH"

          # Sign inside-out: deepest nested binaries first

          # Sign all executables, dylibs, and apps inside frameworks
          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            find "$APP_PATH/Contents/Frameworks" \
              \( -name "*.app" -o -name "*.dylib" -o -name "*.xpc" -o -type f -perm +111 \) \
              -not -path "*/Headers/*" -not -path "*/Modules/*" -not -name "*.h" \
              | sort -r | while read f; do
              # Skip non-Mach-O files
              file "$f" | grep -q "Mach-O" || continue
              codesign --force --options runtime --timestamp \
                --sign "Developer ID Application" "$f"
            done

            # Then sign the frameworks themselves
            find "$APP_PATH/Contents/Frameworks" -name "*.framework" -maxdepth 1 | while read f; do
              codesign --force --options runtime --timestamp \
                --sign "Developer ID Application" "$f"
            done
          fi

          # Sign the Network Extension
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application" \
            --entitlements BurrowTunnel/BurrowTunnel.release.entitlements \
            "$APP_PATH/Contents/PlugIns/BurrowTunnel.appex"

          # Sign the main app last
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application" \
            --entitlements Burrow/Burrow.release.entitlements \
            "$APP_PATH"

          # Verify
          codesign -vvv --deep --strict "$APP_PATH"

      # ── Package ──────────────────────────────────────────────────

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Burrow" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Burrow.app" 175 190 \
            --app-drop-link 425 190 \
            --no-internet-enable \
            $RUNNER_TEMP/Burrow.dmg \
            $RUNNER_TEMP/export/Burrow.app || true

          codesign --force --sign "Developer ID Application" $RUNNER_TEMP/Burrow.dmg

      # ── Notarize ─────────────────────────────────────────────────

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"

          SUBMIT_OUTPUT=$(xcrun notarytool submit $RUNNER_TEMP/Burrow.dmg \
            --keychain-profile "notarytool-profile" \
            --wait \
            --timeout 30m 2>&1) || true
          echo "$SUBMIT_OUTPUT"

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')

          if echo "$SUBMIT_OUTPUT" | grep -q "status: Invalid"; then
            echo "Notarization failed. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --keychain-profile "notarytool-profile" 2>&1
            exit 1
          fi

          xcrun stapler staple $RUNNER_TEMP/Burrow.dmg
          xcrun stapler validate $RUNNER_TEMP/Burrow.dmg

      # ── Release ──────────────────────────────────────────────────

      # ── Sparkle Signing ─────────────────────────────────────────

      - name: Sign DMG with Sparkle EdDSA
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SPARKLE_VERSION="2.9.1"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar xJ -C /tmp/sparkle
          SIG_OUTPUT=$(/tmp/sparkle/bin/sign_update $RUNNER_TEMP/Burrow.dmg)
          echo "SPARKLE_ED_SIG=$(echo "$SIG_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')" >> $GITHUB_ENV
          echo "DMG_LENGTH=$(echo "$SIG_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')" >> $GITHUB_ENV

      # ── Release ──────────────────────────────────────────────────

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/Burrow.dmg
          name: Burrow ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Appcast ──────────────────────────────────────────────────

      - name: Fetch release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" --json body -q .body > $RUNNER_TEMP/release_notes.md 2>/dev/null || echo "" > $RUNNER_TEMP/release_notes.md

      - name: Update appcast
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BUILD_NUMBER=$(grep -A1 'CURRENT_PROJECT_VERSION' Burrow.xcodeproj/project.pbxproj | grep -o '[0-9]*' | head -1)

          # Fetch existing appcast from gh-pages
          mkdir -p appcast-output
          git fetch origin gh-pages 2>/dev/null || true
          git show origin/gh-pages:appcast.xml > appcast-output/appcast.xml 2>/dev/null || cat > appcast-output/appcast.xml << 'SKELETON'
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Burrow Updates</title>
              <link>https://supermanifolds.github.io/Burrow/appcast.xml</link>
              <description>Most recent updates for Burrow</description>
              <language>en</language>
            </channel>
          </rss>
          SKELETON

          python3 scripts/update_appcast.py \
            --version "$VERSION" \
            --build "${BUILD_NUMBER:-1}" \
            --signature "$SPARKLE_ED_SIG" \
            --length "$DMG_LENGTH" \
            --url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Burrow.dmg" \
            --notes "$(cat $RUNNER_TEMP/release_notes.md)" \
            --appcast appcast-output/appcast.xml

      - name: Deploy appcast to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./appcast-output
          publish_branch: gh-pages
          keep_files: true

      # ── Cleanup ──────────────────────────────────────────────────

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
