name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false

      - name: Resolve packages
        run: xcodebuild -project Burrow.xcodeproj -scheme Burrow -resolvePackageDependencies

      - name: Symlink Go to /usr/local/bin
        run: |
          sudo ln -sf "$(which go)" /usr/local/bin/go

      - name: Build
        run: |
          xcodebuild -project Burrow.xcodeproj \
            -scheme Burrow \
            -configuration Debug \
            -destination 'platform=macOS' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict
