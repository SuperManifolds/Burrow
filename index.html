<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Burrow — Native macOS VPN Client</title>
  <meta name="description" content="A lightweight, native macOS WireGuard VPN client for Mullvad VPN. Built with SwiftUI.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0F0E14;
      color: #e8e8ed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    main {
      max-width: 800px;
      width: 100%;
      padding: 80px 24px 40px;
      text-align: center;
    }

    .icon {
      width: 128px;
      height: 128px;
      border-radius: 28px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 18px;
      color: #9898a0;
      line-height: 1.5;
      margin-bottom: 40px;
    }

    .subtitle a {
      color: #a78bfa;
      text-decoration: none;
    }

    .subtitle a:hover {
      text-decoration: underline;
    }

    .download-btn {
      display: inline-block;
      background: #a78bfa;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      padding: 14px 40px;
      border-radius: 12px;
      text-decoration: none;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .download-btn:hover {
      background: #b89dff;
      transform: scale(1.03);
    }

    .download-btn:active {
      transform: scale(0.98);
    }

    .requirements {
      font-size: 13px;
      color: #6b6b74;
      margin-top: 12px;
    }

    .screenshot {
      margin-top: 56px;
      width: 100%;
      max-width: 720px;
      border-radius: 12px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
    }

    footer {
      padding: 40px 24px;
      font-size: 13px;
      color: #6b6b74;
    }

    footer a {
      color: #9898a0;
      text-decoration: none;
      margin: 0 12px;
    }

    footer a:hover {
      color: #e8e8ed;
    }

    @media (max-width: 600px) {
      main { padding: 48px 20px 32px; }
      h1 { font-size: 36px; }
      .subtitle { font-size: 16px; }
      .icon { width: 96px; height: 96px; border-radius: 22px; }
    }
  </style>
</head>
<body>
  <main>
    <img src="burrow-icon-dark.png" alt="Burrow" class="icon">
    <h1>Burrow</h1>
    <p class="subtitle">
      A lightweight, native macOS WireGuard VPN client<br>
      for <a href="https://mullvad.net">Mullvad VPN</a>
    </p>

    <a href="https://github.com/SuperManifolds/Burrow/releases/latest/download/Burrow.dmg" class="download-btn">
      Download for macOS
    </a>
    <p class="requirements">Requires macOS 26.4 or later (Apple Silicon)</p>

    <img src="burrow.png" alt="Burrow connected to a VPN server" class="screenshot">
  </main>

  <footer>
    <a href="https://github.com/SuperManifolds/Burrow">GitHub</a>
    <a href="https://github.com/SuperManifolds/Burrow/blob/main/CONTRIBUTING.md">Contributing</a>
    <a href="https://github.com/SuperManifolds/Burrow/blob/main/LICENSE">MIT License</a>
  </footer>
</body>
</html>
